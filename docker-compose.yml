version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: ats-postgres
    restart: always
    env_file:
      - .env
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - ats-network

  hono-api:
    build:
      context: ./my-hono-app
    container_name: ats-hono-api
    restart: always
    env_file:
      - ./my-hono-app/.env
    ports:
      - "3000:3000"
    depends_on:
      - postgres
    networks:
      - ats-network

  python-worker:
    build:
      context: ./ats_backend_system
    container_name: ats-python-worker
    restart: always
    ports:
      - "3001:3001"
    networks:
      - ats-network

networks:
  ats-network:
    driver: bridge

volumes:
  pgdata:
